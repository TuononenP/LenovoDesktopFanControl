name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      PROJECT: LenovoDesktopFanControl/LenovoDesktopFanControl.csproj
      SOLUTION: LenovoDesktopFanControl.sln

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Resolve release version
        id: version
        shell: pwsh
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = $env:MANUAL_VERSION.TrimStart('v')
          } else {
            $version = "${{ github.ref_name }}".TrimStart('v')
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Version '$version' is not a valid semantic version."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore $env:SOLUTION
          dotnet restore $env:PROJECT --runtime win-x64

      - name: Test
        run: dotnet test $env:SOLUTION --configuration Release --no-restore

      - name: Publish portable Windows build
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            --no-restore `
            --output artifacts/portable `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:DebugType=None `
            -p:DebugSymbols=false

      - name: Publish self-contained Windows build
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            --output artifacts/self-contained `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false

      - name: Package artifacts and checksums
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $releaseDirectory = Join-Path $PWD "release"
          New-Item -ItemType Directory -Path $releaseDirectory -Force | Out-Null

          $portable = Join-Path $releaseDirectory "LenovoDesktopFanControl-$version-win-x64.zip"
          $selfContained = Join-Path $releaseDirectory "LenovoDesktopFanControl-$version-win-x64-self-contained.zip"
          Compress-Archive -Path "artifacts/portable/*" -DestinationPath $portable
          Compress-Archive -Path "artifacts/self-contained/*" -DestinationPath $selfContained

          Get-FileHash $portable, $selfContained -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Path (Join-Path $releaseDirectory "SHA256SUMS.txt") -Encoding ascii

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: LenovoDesktopFanControl-${{ steps.version.outputs.version }}
          path: release/*
          if-no-files-found: error

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            git tag $tag $env:GITHUB_SHA
            git push origin $tag
          }

          gh release create $tag release/* `
            --title "Lenovo Desktop Fan Control $tag" `
            --generate-notes `
            --verify-tag
